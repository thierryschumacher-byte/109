kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: quotes
  labels:
    app: quotes-app
    app.kubernetes.io/part-of: quotes-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quotes
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
